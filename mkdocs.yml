site_name: KHosting
site_description: Documentación del homelab
docs_dir: docs/pages
site_dir: docs/.site

exclude_docs: |
  private/**

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Modo nocturno
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Esquema:
      - Resumen: architecture/index.md
      - Flujos de acceso: architecture/access-flows.md
      - Topología de red: architecture/network-topology.md
  - Infraestructura:
      - Resumen: infrastructure/index.md
      - Configuración del servidor: infrastructure/server-setup.md
      - Docker: infrastructure/docker.md
  - Servicios:
