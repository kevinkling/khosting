      - Tailscale: networking/tailscale.md
      - Cloudflare Tunnel: networking/cloudflare-tunnel.md
      - Nginx Proxy Manager: networking/nginx-proxy-manager.md
      - DNS: networking/dns.md
  - Monitoreo: monitoring/index.md
  - Seguridad: security/index.md
  - Bases de datos: databases/index.md
  - Automatización:
      - Resumen: automation/index.md
      - Jenkins — Kashflow: automation/jenkins-kashflow.md
  - IA: ai/index.md
  - Inventario:
