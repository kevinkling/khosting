services:
  mkdocs:
    build:
      context: ..
      dockerfile: docs/Dockerfile
    image: khosting-mkdocs:latest
    container_name: mkdocs
    restart: unless-stopped
    ports:
      - "${MKDOCS_PUBLISH:-8000}:80"
    expose:
      - "80"
    environment:
      - TZ=America/Argentina/Buenos_Aires
    networks:
      - hosting-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M

  # Solo desarrollo: live reload con mkdocs serve (no usar en producción)
  mkdocs-dev:
    image: squidfunk/mkdocs-material:latest
    container_name: mkdocs-dev
    profiles:
      - dev
    restart: unless-stopped
    working_dir: /site
    command: mkdocs serve -a 0.0.0.0:8000
    ports:
      - "${MKDOCS_DEV_PUBLISH:-8001}:8000"
    environment:
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - ..:/site
    networks:
      - hosting-network

networks:
  hosting-network:
    name: hosting-network
    external: true
