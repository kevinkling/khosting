services:
  
  # Komprabot (Bot de Telegram)
  komprabot:
    build:
      context: ../../komprabot
      dockerfile: Dockerfile
    container_name: komprabot
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - BOT_TOKEN=${KOMPRABOT_BOT_TOKEN}
      - PORT=8080
      - USE_WEBHOOKS=${KOMPRABOT_USE_WEBHOOKS}
      - WEBHOOK_URL=${KOMPRABOT_WEBHOOK_URL}
      - NODE_ENV=production
    volumes:
      - komprabot-data:/app/data
    networks:
      - hosting-network
    security_opt:
      - no-new-privileges:true

volumes:
  komprabot-data:

networks:
  hosting-network:
    name: hosting-network
