site_name: KHosting (Privado)
site_description: Documentación completa del homelab (incluye contenido sensible)
docs_dir: docs/pages
site_dir: docs/.site-private

theme:
  name: material
  language: es
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Infraestructura:
      - Resumen: infrastructure/index.md
      - Configuración del servidor: infrastructure/server-setup.md
  - Servicios: services/index.md
  - Redes: networking/index.md
  - Monitoreo: monitoring/index.md
  - Seguridad: security/index.md
  - Bases de datos: databases/index.md
  - Automatización: automation/index.md
  - IA: ai/index.md
  - Inventario:
      - Resumen: inventory/index.md
      - Servidores: inventory/servers/index.md
      - VPS: inventory/vps/index.md
      - Máquinas virtuales: inventory/virtual-machines/index.md
      - Docker:
          - Resumen: inventory/docker/index.md
          - Contenedores: inventory/docker/containers/index.md
          - Imágenes: inventory/docker/images/index.md
          - Compose: inventory/docker/compose/index.md
      - Redes:
          - Resumen: inventory/networking/index.md
          - Redes: inventory/networking/networks/index.md
          - Puertos: inventory/networking/ports/index.md
          - DNS: inventory/networking/dns/index.md
      - Dominios: inventory/domains/index.md
      - Reverse proxy: inventory/reverse-proxy/index.md
      - Certificados: inventory/certificates/index.md
      - Volúmenes: inventory/volumes/index.md
      - Backups: inventory/backups/index.md
      - Variables: inventory/variables/index.md
      - Dependencias: inventory/dependencies/index.md
  - Runbooks: runbooks/index.md
  - Troubleshooting: troubleshooting/index.md
  - Cheatsheets:
      - Resumen: cheatsheets/index.md
      - Docker: cheatsheets/docker.md
  - Referencias: references/index.md
  - Privado:
      - Resumen: private/index.md
      - Credenciales:
          - Índice: private/credentials/index.md
          - Portainer: private/credentials/portainer.md
          - Duplicati: private/credentials/duplicati.md
          - Nginx Proxy Manager: private/credentials/nginx-proxy-manager.md
          - Jenkins: private/credentials/jenkins.md
          - FileBrowser: private/credentials/filebrowser.md
          - SSH del servidor: private/credentials/server-ssh.md
      - Inventario operativo:
          - Resumen: private/inventory/index.md
          - Servidor: private/inventory/server.md
          - Contenedores: private/inventory/containers.md
      - Automatización:
          - Pipeline Kashflow: private/automation/jenkins-kashflow.md
